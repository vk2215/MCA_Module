<!DOCTYPE html>
<html>

<head>
    <title>Compliance Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css" />
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/themes/light-border.css" />
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>

    <style>
        :root {
            --bg: #f1f5f9;
            --sidebar: #0f172a;
            --paper-bg: #ffffff;
            --accent: #2563eb;
            --font-body: 'Times New Roman', Times, serif;
            --font-ui: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            background: var(--bg);
            font-family: var(--font-ui);
        }

        #sidebar {
            width: 260px;
            background: var(--sidebar);
            color: white;
            height: 100vh;
            position: fixed;
            overflow-y: auto;
        }

        #sidebar h2 {
            padding: 20px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #1e293b;
        }

        .chap-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s;
            color: #cbd5e1;
            border-bottom: 1px solid #1e293b;
        }

        .chap-item.active {
            background: #1e293b !important;
            color: #ffffff !important;
            border-left: 4px solid #ffffff;
            font-weight: 600;
        }

        #main {
            margin-left: 260px;
            padding: 40px;
            flex: 1;
            overflow-y: auto;
        }

        .paper {
            background: var(--paper-bg);
            padding: 60px 80px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 900px;
            margin: 0 auto;
            font-family: var(--font-body);
            font-size: 12pt;
            line-height: 1.5;
            color: #000;
            text-align: justify;
        }

        h1 {
            text-align: center;
            text-transform: uppercase;
            font-size: 1.4rem;
            margin: 0 0 22px 0;
            font-weight: bold;
        }

        p {
            margin: 0 0 8px 0;
        }

        .chapter-subtitle {
            text-align: center;
            font-weight: 700;
            margin: 0 0 16px 0;
        }

        .pdf-page-break {
            margin-top: 40px;
        }

        .sch-header {
            text-align: center;
            font-weight: 700;
            font-size: 18pt;
            margin: 30px 0 10px 0;
            text-transform: uppercase;
        }

        .sch-subtitle {
            text-align: center;
            font-size: 13pt;
            margin-bottom: 10px;
        }

        .clause-row {
            display: flex;
            margin-bottom: 10px;
        }

        .marker {
            flex: 0 0 55px;
            font-weight: bold;
        }

        .body {
            flex: 1;
            text-align: justify;
        }

        .l1 {
            margin-left: 0;
            font-weight: bold;
        }

        .l2 {
            margin-left: 20px;
        }

        .l3 {
            margin-left: 45px;
        }

        .l4 {
            margin-left: 70px;
        }


        .clause {
            display: flex;
            align-items: flex-start;
            margin: 8px 0;
        }


        .clause-marker {
            width: 70px;
            text-align: right;
            padding-right: 10px;
            white-space: nowrap;
            flex-shrink: 0;
        }


        .clause-body {
            flex: 1;
            line-height: 1.6;
        }


        .clause-l1 {
            margin-left: 0px;
        }

        .clause-l2 {
            margin-left: 30px;
        }

        .clause-l3 {
            margin-left: 60px;
        }

        .clause-l4 {
            margin-left: 90px;
        }

        .clause-l5 {
            margin-left: 120px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 18px 0;
            table-layout: auto;
            border: 1.5px solid #000;
        }

        th,
        td {
            border: 1px solid #000 !important;
            padding: 6px 8px;
            text-align: left;
            vertical-align: top;
            font-size: 10.5pt;
            line-height: 1.4;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        td p,
        th p {
            margin: 0;
            text-align: left;
        }

        th {
            background: #f8fafc;
            font-weight: 700;
            text-align: center;
        }


        .hover-term {
            color: #000000 !important;
            font-weight: normal !important;
            text-decoration: none !important;
            border-bottom: 1px solid #000000;
            cursor: help;
        }

        .hover-term:hover {
            background: #f8fafc;
        }

        .reg-bold-highlight {
            font-weight: 800 !important;
            background-color: #fff9c4 !important;
            color: #000 !important;
        }

        .tippy-box {
            background-color: #ffffff;
            color: #0f172a;
            border: 1px solid var(--accent);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .nested-pt {
            display: block;
            margin-top: 5px;
            padding-left: 10px;
            border-left: 2px solid var(--accent);
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h2>Regulations</h2>
        <div id="chapter-list">Loading...</div>
    </div>

    <div id="main">
        <div id="content-area" class="paper">Select a chapter from the sidebar.</div>
    </div>

    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>

    <script>
        const md = window.markdownit({ html: true, linkify: true, typographer: false });

        function isTableLine(line) {
            return /^\s*\|/.test(line);
        }

        function cleanInlineMarkdown(line) {
            return line.replace(/\*\*/g, '').trim();
        }

        function isHeadingLine(line) {
            const plain = cleanInlineMarkdown(line);
            return /^(CHAPTER\s+[IVXLC0-9]+|PRELIMINARY|PROCEDURE FOR REGISTRATION OF A MUTUAL FUND)$/i.test(plain);
        }

        function isClauseStart(line) {
            const plain = cleanInlineMarkdown(line);
            return /^\d+\./.test(plain)
                || /^\(\d+\)/.test(plain)
                || /^\(([ivxlcdm]+)\)/i.test(plain)
                || /^\(([a-z]{1,3})\)/i.test(plain)
                || /^[a-z]\./i.test(plain);
        }

        function preprocessLegalMarkdown(rawText) {
            const lines = rawText
                .replace(/\r/g, '')
                .replace(/\*\*/g, '')
                .split('\n');
            const blocks = [];
            let paragraph = '';
            let tableLines = [];

            const flushParagraph = () => {
                if (paragraph.trim()) {
                    blocks.push(paragraph.trim());
                    paragraph = '';
                }
            };

            const flushTable = () => {
                if (tableLines.length) {
                    blocks.push(tableLines.join('\n'));
                    tableLines = [];
                }
            };

            for (const sourceLine of lines) {
                const line = sourceLine.replace(/\s+$/g, '');
                const trimmed = line.trim();

                if (!trimmed) {
                    flushParagraph();
                    flushTable();
                    continue;
                }

                if (isTableLine(trimmed)) {
                    flushParagraph();
                    tableLines.push(trimmed);
                    continue;
                }

                flushTable();

                if (isHeadingLine(trimmed)) {
                    flushParagraph();
                    blocks.push(trimmed);
                    continue;
                }

                if (isClauseStart(trimmed)) {
                    flushParagraph();
                    paragraph = trimmed;
                    continue;
                }

                if (!paragraph) {
                    paragraph = trimmed;
                } else {
                    paragraph += ` ${trimmed}`;
                }
            }

            flushParagraph();
            flushTable();
            return blocks.join('\n\n');
        }

        function detectClauseClass(text) {
            const plain = text.trim();

            if (/^\d+\./.test(plain)) return 'clause-l1';

            if (/^\(\d+\)/.test(plain)) return 'clause-l2';


            if (/^\((?:i|ii|iii|iv|v|vi|vii|viii|ix|x|xi|xii|xiii|xiv|xv)\)/i.test(plain))
                return 'clause-l4';

            if (/^\([a-z]{1,3}\)/i.test(plain))
                return 'clause-l3';

            if (/^[a-z]\./i.test(plain)) return 'clause-l5';

            return '';
        }
        function wrapClauseMarkers(container) {
            const markerPattern = /^(\d+\.|\(\d+\)|\([a-z]{1,3}\)|\((?:i|ii|iii|iv|v|vi|vii|viii|ix|x|xi|xii|xiii|xiv|xv)\)|[a-z]\.)\s+/i;

            const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

            container.querySelectorAll('p.clause').forEach(p => {
                if (p.querySelector('.clause-marker')) return;

                const text = p.textContent.replace(/\s+/g, ' ').trim();
                const textMatch = text.match(markerPattern);
                if (!textMatch) return;

                const marker = textMatch[1];
                const escapedMarker = escapeRegExp(marker);

                const html = p.innerHTML.trim();
                const leadingMarkerRegex = new RegExp(
                    `^(?:\\s|&nbsp;)*(?:<strong>)?\\s*${escapedMarker}\\s*(?:<\\/strong>)?(?:\\s|&nbsp;)*`,
                    'i'
                );

                let bodyHtml = html.replace(leadingMarkerRegex, '').trim();
                if (!bodyHtml) {
                    bodyHtml = text.slice(textMatch[0].length).trim();
                }

                p.innerHTML = `<span class="clause-marker">${marker}</span><span class="clause-body">${bodyHtml}</span>`;
            });
        }

        function postProcessLayout(container) {
            container.querySelectorAll('p').forEach(p => {
                const text = p.textContent.replace(/\s+/g, ' ').trim();
                if (!text) return;

                const clauseClass = detectClauseClass(text);
                if (clauseClass) {
                    p.classList.add('clause', clauseClass);
                } else if (/^[A-Z\s]+$/.test(text) && text.length <= 60) {
                    p.classList.add('chapter-subtitle');
                }
            });

            container.querySelectorAll('table td, table th').forEach(cell => {
                const cellText = cell.textContent.replace(/\s+/g, ' ').trim();
                // Clear cells that are only placeholder column names like Col1, Col2 etc.
                if (/^Col\d+$/i.test(cellText)) {
                    cell.innerHTML = '';
                }
                // Clean **bold markers** left in table cells
                cell.innerHTML = cell.innerHTML.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            });

            // Auto-detect and minimize first column if it's all short (row numbers/markers)
            container.querySelectorAll('table').forEach(table => {
                const rows = Array.from(table.querySelectorAll('tr'));
                if (!rows.length) return;

                const numCols = rows[0].querySelectorAll('td, th').length;

                rows.forEach(row => {
                    const cells = Array.from(row.querySelectorAll('td, th'));
                    if (cells.length < 2) return;

                    // Spanning row detection: all non-empty cells contain the same text
                    const nonEmpty = cells.filter(c => c.textContent.trim().length > 0);
                    if (nonEmpty.length >= 2) {
                        const firstText = nonEmpty[0].textContent.trim();
                        const allSame = nonEmpty.every(c => c.textContent.trim() === firstText);
                        if (allSame) {
                            // Collapse into a single spanning cell
                            const spanCell = cells[0];
                            spanCell.setAttribute('colspan', numCols);
                            spanCell.style.textAlign = 'left';
                            spanCell.style.fontWeight = 'bold';
                            spanCell.style.background = '#f0f4f8';
                            // Remove the duplicate cells
                            for (let c = 1; c < cells.length; c++) cells[c].remove();
                            return; // skip first-column narrowing for this row
                        }
                    }

                    // Single non-empty cell with empty others => spanning row too
                    if (nonEmpty.length === 1 && cells.length > 1) {
                        const spanCell = cells[0].textContent.trim() ? cells[0] : nonEmpty[0];
                        spanCell.setAttribute('colspan', numCols);
                        spanCell.style.textAlign = 'left';
                        spanCell.style.fontWeight = 'bold';
                        spanCell.style.background = '#f0f4f8';
                        cells.forEach(c => { if (c !== spanCell) c.remove(); });
                        return;
                    }
                });

                // Auto-narrow first column only when all first cells are short markers
                const firstCells = Array.from(table.querySelectorAll('tr td:first-child, tr th:first-child'))
                    .filter(c => !c.hasAttribute('colspan'));
                const allShort = firstCells.length > 0 && firstCells.every(c => c.textContent.trim().length <= 5);
                if (allShort) {
                    firstCells.forEach(c => {
                        c.style.width = '5%';
                        c.style.whiteSpace = 'nowrap';
                        c.style.textAlign = 'center';
                    });
                }
            });
        }

        fetch('/api/chapters')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('chapter-list');
                list.innerHTML = data.map(c => `
                    <li class="chap-item" onclick="loadChapter('${c}')">Chapter ${c}</li>
                `).join('');
            });

        async function loadChapter(name) {
            const area = document.getElementById('content-area');
            document.querySelectorAll('.chap-item').forEach(el => el.classList.remove('active'));

            const items = document.querySelectorAll('.chap-item');
            items.forEach(item => {
                if (item.innerText.trim().endsWith(` ${name}`)) {
                    item.classList.add('active');
                }
            });

            area.innerHTML = '<em>Loading...</em>';

            try {
                const res = await fetch(`/api/content/${name}`);
                const data = await res.json();
                const normalized = preprocessLegalMarkdown(data.html_content);

                area.innerHTML = `<h1>Chapter ${name}</h1>${md.render(normalized)}`;

                postProcessLayout(area);
                wrapClauseMarkers(area);
                document.getElementById('main').scrollTop = 0;

                tippy('.hover-term', {
                    content: 'Loading...',
                    allowHTML: true,
                    theme: 'light-border',
                    interactive: true,
                    maxWidth: 400,
                    onShow(instance) {
                        const id = instance.reference.getAttribute('data-id');
                        fetch(`/api/definition/${id}`).then(r => r.json()).then(d => {
                            const formatted = d.verbatim.replace(/\((i+)\)/g, '<span class="nested-pt">($1)</span>');
                            instance.setContent(`
                                <div style="padding:5px;">
                                    <strong style="color:#2563eb;">${d.term}</strong>
                                    <div style="margin-top:5px;">${formatted}</div>
                                </div>
                            `);
                        });
                    }
                });
            } catch (err) {
                area.innerHTML = 'Error loading chapter.';
            }
        }
    </script>
</body>

</html>
